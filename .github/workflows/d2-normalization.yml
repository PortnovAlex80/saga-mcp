name: D2 normalization validation

on:
  pull_request:
    branches: [saga3-discovery]

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: d2-discovery-normalization
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Reconstruct integration patch
        run: |
          cat .d2-integration/chunk*.b64 | base64 -d | gunzip > /tmp/apply_d2.py
          python3 -m py_compile /tmp/apply_d2.py
      - name: Apply integration patch
        id: apply
        continue-on-error: true
        run: |
          set +e
          python3 /tmp/apply_d2.py > /tmp/d2-apply.log 2>&1
          code=$?
          cat /tmp/d2-apply.log
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload apply diagnostic
        if: steps.apply.outputs.code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: d2-apply-diagnostic
          path: /tmp/d2-apply.log
      - name: Fail on apply mismatch
        if: steps.apply.outputs.code != '0'
        run: exit 1
      - name: Install dependencies
        if: steps.apply.outputs.code == '0'
        run: npm ci
      - name: Test
        if: steps.apply.outputs.code == '0'
        id: test
        continue-on-error: true
        run: |
          set +e
          npm test > /tmp/d2-test.log 2>&1
          code=$?
          cat /tmp/d2-test.log
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload test diagnostic
        if: steps.apply.outputs.code == '0' && steps.test.outputs.code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: d2-test-diagnostic
          path: /tmp/d2-test.log
      - name: Fail on test failure
        if: steps.apply.outputs.code == '0' && steps.test.outputs.code != '0'
        run: exit 1
      - name: Commit verified D2 integration
        if: steps.apply.outputs.code == '0' && steps.test.outputs.code == '0'
        run: |
          git rm -r .d2-integration
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(saga3-d2): integrate bounded discovery normalization"
          git push origin HEAD:d2-discovery-normalization
