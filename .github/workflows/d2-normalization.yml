name: D2 normalization validation

on:
  pull_request:
    branches: [saga3-discovery]

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: d2-discovery-normalization
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply D2 lifecycle follow-up
        run: python3 .d2-followup/apply.py
      - run: npm ci
      - run: npm test
      - name: Commit verified follow-up
        run: |
          git rm -r .d2-followup
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(saga3-d2): preserve normalization lifecycle on restart and failure"
          git push origin HEAD:d2-discovery-normalization
