name: Verify Phase B pure Saga2Engine

on:
  pull_request:
    branches: [saga2-refactoring]

permissions:
  contents: write

concurrency:
  group: phase-b-pure-engine-${{ github.head_ref }}
  cancel-in-progress: false

jobs:
  migrate-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Require accepted persistence extraction base
        run: git merge-base --is-ancestor f625a32e3bf6799b54299d512b50139bc3476bda HEAD

      - name: Install dependencies
        run: npm ci

      - name: Apply pure-engine migration and run all gates
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          set +e
          rm -rf .phase-b-pure-engine-ci
          mkdir -p .phase-b-pure-engine-ci/generated

          node tools/apply-phase-b-pure-engine.mjs > .phase-b-pure-engine-ci/migration.txt 2>&1
          MIGRATION_STATUS=$?
          if [ ${MIGRATION_STATUS} -eq 0 ]; then
            node tools/apply-phase-b-pure-engine-tests.mjs >> .phase-b-pure-engine-ci/migration.txt 2>&1
            MIGRATION_STATUS=$?
          fi
          if [ ${MIGRATION_STATUS} -eq 0 ]; then
            rm -f src/application/ports/legacy-saga2-runtime.ts
            rm -f src/infrastructure/runtime/legacy-saga2-runner.ts
          fi

          BUILD_STATUS=99
          ARCH_STATUS=99
          CHAR_STATUS=99
          E2E_STATUS=99
          FULL_STATUS=99

          if [ ${MIGRATION_STATUS} -eq 0 ]; then
            npm run build > .phase-b-pure-engine-ci/build.txt 2>&1
            BUILD_STATUS=$?
          fi
          if [ ${BUILD_STATUS} -eq 0 ]; then
            npm run test:architecture > .phase-b-pure-engine-ci/architecture.txt 2>&1
            ARCH_STATUS=$?
          fi
          if [ ${ARCH_STATUS} -eq 0 ]; then
            npm run test:characterization > .phase-b-pure-engine-ci/characterization.txt 2>&1
            CHAR_STATUS=$?
          fi
          if [ ${CHAR_STATUS} -eq 0 ]; then
            npm run test:e2e > .phase-b-pure-engine-ci/e2e.txt 2>&1
            E2E_STATUS=$?
          fi
          if [ ${E2E_STATUS} -eq 0 ]; then
            npm test > .phase-b-pure-engine-ci/full-test.txt 2>&1
            FULL_STATUS=$?
          fi

          printf 'migration=%s\nbuild=%s\narchitecture=%s\ncharacterization=%s\ne2e=%s\nfull=%s\n' \
            "${MIGRATION_STATUS}" "${BUILD_STATUS}" "${ARCH_STATUS}" \
            "${CHAR_STATUS}" "${E2E_STATUS}" "${FULL_STATUS}" \
            > .phase-b-pure-engine-ci/status.txt

          cp src/orchestrate.ts .phase-b-pure-engine-ci/generated/orchestrate.ts 2>/dev/null || true
          cp src/engines/saga2-engine.ts .phase-b-pure-engine-ci/generated/saga2-engine.ts 2>/dev/null || true
          cp tests/architecture/saga2-boundaries.test.mjs .phase-b-pure-engine-ci/generated/architecture.test.mjs 2>/dev/null || true
          cp tests/characterization/saga2-runtime-contracts.test.mjs .phase-b-pure-engine-ci/generated/characterization.test.mjs 2>/dev/null || true

          if [ ${MIGRATION_STATUS} -ne 0 ] || [ ${BUILD_STATUS} -ne 0 ] || \
             [ ${ARCH_STATUS} -ne 0 ] || [ ${CHAR_STATUS} -ne 0 ] || \
             [ ${E2E_STATUS} -ne 0 ] || [ ${FULL_STATUS} -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f .phase-b-pure-engine-ci
            git commit -m "ci(phase-b): capture pure-engine extraction failure"
            git push origin HEAD:${TARGET_BRANCH}
            cat .phase-b-pure-engine-ci/status.txt
            cat .phase-b-pure-engine-ci/migration.txt
            cat .phase-b-pure-engine-ci/build.txt 2>/dev/null || true
            cat .phase-b-pure-engine-ci/architecture.txt 2>/dev/null || true
            cat .phase-b-pure-engine-ci/characterization.txt 2>/dev/null || true
            cat .phase-b-pure-engine-ci/e2e.txt 2>/dev/null || true
            exit 1
          fi

          rm -rf .phase-b-pure-engine-ci
          rm -f tools/apply-phase-b-pure-engine.mjs
          rm -f tools/apply-phase-b-pure-engine-tests.mjs
          rm -f .github/workflows/apply-phase-b-pure-engine.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(phase-b): finish pure Saga2Engine"
          git push origin HEAD:${TARGET_BRANCH}
