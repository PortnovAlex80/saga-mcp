name: D1.1 correction

on:
  push:
    branches: [saga3-discovery]
    paths:
      - ".github/workflows/d1-1-correction.yml"
  pull_request:
    branches: [saga3-discovery]
    paths:
      - ".d1-correction/trigger"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: saga3-discovery
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Reconstruct patch
        run: |
          cat .d1-correction/chunk*.b64 | base64 -d > /tmp/apply_d11.py
          python3 -m py_compile /tmp/apply_d11.py

      - name: Apply correction
        run: python3 /tmp/apply_d11.py

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test

      - name: Commit verified correction
        run: |
          git rm -r .d1-correction .github/workflows/d1-1-correction.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(saga3-d1-1): fail closed and resume paused intents"
          git push origin HEAD:saga3-discovery
