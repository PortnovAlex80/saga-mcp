name: Apply Phase B block 1-4

on:
  workflow_dispatch:
  push:
    branches: [saga2-refactoring]
    paths:
      - tools/apply-phase-b-block.mjs
      - .github/workflows/apply-phase-b-block.yml
  pull_request:
    branches: [saga2-refactoring]

permissions:
  contents: write

concurrency:
  group: phase-b-block-${{ github.head_ref || 'saga2-refactoring' }}
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'saga2-refactoring' }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply guarded source migration
        run: node tools/apply-phase-b-block.mjs

      - name: Run verification gates and capture diagnostics
        env:
          TARGET_BRANCH: ${{ github.head_ref || 'saga2-refactoring' }}
        run: |
          set +e
          rm -rf .phase-b-ci
          mkdir -p .phase-b-ci

          npm run build > .phase-b-ci/build.txt 2>&1
          BUILD_STATUS=$?

          ARCH_STATUS=99
          CHAR_STATUS=99
          E2E_STATUS=99
          if [ ${BUILD_STATUS} -eq 0 ]; then
            npm run test:architecture > .phase-b-ci/architecture.txt 2>&1
            ARCH_STATUS=$?
          fi
          if [ ${BUILD_STATUS} -eq 0 ] && [ ${ARCH_STATUS} -eq 0 ]; then
            npm run test:characterization > .phase-b-ci/characterization.txt 2>&1
            CHAR_STATUS=$?
          fi
          if [ ${BUILD_STATUS} -eq 0 ] && [ ${ARCH_STATUS} -eq 0 ] && [ ${CHAR_STATUS} -eq 0 ]; then
            npm run test:e2e > .phase-b-ci/e2e.txt 2>&1
            E2E_STATUS=$?
          fi

          printf 'build=%s\narchitecture=%s\ncharacterization=%s\ne2e=%s\n' \
            "${BUILD_STATUS}" "${ARCH_STATUS}" "${CHAR_STATUS}" "${E2E_STATUS}" \
            > .phase-b-ci/status.txt

          if [ ${BUILD_STATUS} -ne 0 ] || [ ${ARCH_STATUS} -ne 0 ] || [ ${CHAR_STATUS} -ne 0 ] || [ ${E2E_STATUS} -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f .phase-b-ci
            git commit -m "ci(phase-b): capture failing verification"
            git push origin HEAD:${TARGET_BRANCH}
            cat .phase-b-ci/status.txt
            cat .phase-b-ci/build.txt
            exit 1
          fi

          rm -rf .phase-b-ci
          rm -f tools/apply-phase-b-block.mjs
          rm -f .github/workflows/apply-phase-b-block.yml
          rm -f .phase-b-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(phase-b): isolate worker frontend admin config"
          git push origin HEAD:${TARGET_BRANCH}
