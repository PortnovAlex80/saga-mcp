name: Apply Phase B block 1-4

on:
  workflow_dispatch:
  push:
    branches: [saga2-refactoring]
    paths:
      - tools/apply-phase-b-block.mjs
      - .github/workflows/apply-phase-b-block.yml

permissions:
  contents: write

concurrency:
  group: phase-b-block-saga2-refactoring
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: saga2-refactoring
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply guarded source migration
        run: node tools/apply-phase-b-block.mjs

      - name: TypeScript build
        run: npm run build

      - name: Architecture tests
        run: npm run test:architecture

      - name: Characterization tests
        run: npm run test:characterization

      - name: Mock E2E pipeline
        run: npm run test:e2e

      - name: Commit verified source changes
        run: |
          rm tools/apply-phase-b-block.mjs
          rm .github/workflows/apply-phase-b-block.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(phase-b): isolate worker frontend admin config"
          git push origin HEAD:saga2-refactoring
