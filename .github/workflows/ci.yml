name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: TypeScript strict build
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/
        continue-on-error: true

      - name: Tests
        run: npm test

      - name: cgad-spec-lint self-check
        run: node tools/cgad-spec-lint.mjs tools/cgad-spec-lint.test.mjs || true
        # Self-check: linter should run without crashing on any SQLite DB
        # Real enforcement: run against project saga.db in a separate step
